<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Support Kiosk</title>
  <style>
    :root {
      --bg: #040506;
      --text: #f8fbff;
      --muted: #c8d0da;
      --nvidia-green: #76b900;
      --nvidia-green-soft: #b8f34a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(118,185,0,0.10) 0, transparent 35%),
        radial-gradient(circle at top right, rgba(18,32,51,0.30) 0, transparent 42%),
        radial-gradient(circle at bottom, #06080b 0, #020306 60%);
      color: var(--text);
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
      padding: 32px;
    }

    .screen.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: min(1180px, 100%);
      padding: 20px 24px;
      text-align: center;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .brand-mark {
      position: relative;
      width: 108px;
      height: 108px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
    }

    .brand-pulse,
    .brand-dot {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
    }

    .brand-pulse {
      width: 40px;
      height: 40px;
      background: rgba(118,185,0,0.22);
      box-shadow:
        0 0 0 0 rgba(118,185,0,0.36),
        0 0 36px rgba(118,185,0,0.20);
      animation: pulseWave 4.6s ease-out infinite;
    }

    .brand-dot {
      width: 30px;
      height: 30px;
      background: var(--nvidia-green);
      box-shadow:
        0 0 22px rgba(118,185,0,0.92),
        0 0 56px rgba(118,185,0,0.38);
      animation: dotBreath 4.6s ease-in-out infinite;
    }

    @keyframes pulseWave {
      0%, 55%, 100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.7);
        box-shadow:
          0 0 0 0 rgba(118,185,0,0.00),
          0 0 16px rgba(118,185,0,0.00);
      }

      8% {
        opacity: 0.95;
        transform: translate(-50%, -50%) scale(0.95);
        box-shadow:
          0 0 0 0 rgba(118,185,0,0.34),
          0 0 24px rgba(118,185,0,0.22);
      }

      24% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(3.2);
        box-shadow:
          0 0 0 30px rgba(118,185,0,0.00),
          0 0 70px rgba(118,185,0,0.04);
      }
    }

    @keyframes dotBreath {
      0%, 55%, 100% {
        transform: translate(-50%, -50%) scale(1);
        box-shadow:
          0 0 22px rgba(118,185,0,0.92),
          0 0 56px rgba(118,185,0,0.38);
      }

      12% {
        transform: translate(-50%, -50%) scale(1.2);
        box-shadow:
          0 0 30px rgba(118,185,0,1),
          0 0 72px rgba(118,185,0,0.48);
      }

      24% {
        transform: translate(-50%, -50%) scale(1);
        box-shadow:
          0 0 22px rgba(118,185,0,0.92),
          0 0 56px rgba(118,185,0,0.34);
      }
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(56px, 7vw, 96px);
      line-height: 0.98;
      letter-spacing: 0.01em;
      text-wrap: balance;
      font-weight: 800;
    }

    p.lead {
      margin: 0 auto 16px;
      max-width: 18ch;
      font-size: clamp(34px, 4vw, 54px);
      line-height: 1.12;
      font-weight: 700;
      color: var(--text);
      text-wrap: balance;
    }

    p.sub {
      margin: 0 auto;
      max-width: 28ch;
      font-size: clamp(22px, 2.2vw, 30px);
      line-height: 1.28;
      color: var(--muted);
      font-weight: 600;
      text-wrap: balance;
    }

    #timer {
      margin: 28px 0 8px;
      font-size: clamp(110px, 15vw, 180px);
      font-weight: 800;
      line-height: 1;
      color: var(--nvidia-green-soft);
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 0 20px rgba(118,185,0,0.7),
        0 0 60px rgba(118,185,0,0.3);
    }

    .timer-label {
      font-size: 20px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 32px;
    }

    button {
      border: none;
      cursor: pointer;
      font: inherit;
      padding: 14px 28px;
      border-radius: 999px;
      min-width: 180px;
      min-height: 56px;
      font-size: 22px;
      font-weight: 700;
      transition:
        transform 0.12s ease-out,
        box-shadow 0.12s ease-out,
        background 0.12s ease-out,
        color 0.12s ease-out,
        border-color 0.12s ease-out;
    }

    button:focus-visible {
      outline: 3px solid var(--nvidia-green-soft);
      outline-offset: 4px;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border: 1px solid rgba(200,208,218,0.35);
    }

    .btn-ghost:hover {
      background: rgba(255,255,255,0.10);
      color: #ffffff;
      transform: translateY(-1px);
    }

    .btn-ghost:active {
      transform: translateY(0);
      background: rgba(255,255,255,0.16);
    }

    @media (max-width: 768px) {
      .screen {
        padding: 18px;
      }

      .brand-mark {
        width: 80px;
        height: 80px;
        margin-bottom: 16px;
      }

      .brand-pulse {
        width: 28px;
        height: 28px;
      }

      .brand-dot {
        width: 22px;
        height: 22px;
      }

      .timer-label {
        font-size: 16px;
      }

      button {
        min-width: 150px;
        font-size: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .brand-pulse,
      .brand-dot {
        animation: none;
      }

      .brand-pulse {
        opacity: 0;
      }

      .brand-dot {
        transform: translate(-50%, -50%) scale(1);
      }
    }
  </style>
</head>
<body>
  <!-- Standby screen -->
  <div id="standby" class="screen active">
    <div class="card">
      <div class="brand-mark" aria-hidden="true">
        <span class="brand-pulse"></span>
        <span class="brand-dot"></span>
      </div>

      <h1>Welcome to Virtual Support</h1>
      <p class="sub">Stand in front of the device, your call will start automatically</p>
    </div>
  </div>

  <!-- Countdown screen -->
  <div id="countdown" class="screen" aria-live="assertive">
    <div class="card">
      <div class="brand-mark" aria-hidden="true">
        <span class="brand-pulse"></span>
        <span class="brand-dot"></span>
      </div>

      <h1>Connecting to support</h1>
      <p class="lead">Please stay in front of the device</p>
      <div id="timer">10</div>
      <div class="timer-label">Seconds remaining</div>
      <p class="sub">Your call will begin automatically.</p>

      <div class="actions">
        <button id="cancelBtn" class="btn-ghost" type="button">
          Cancel call
        </button>
      </div>
    </div>
  </div>

  <script>
    const COUNTDOWN_SECONDS = 5;
    let countdownHandle = null;

    function setScreen(name) {
      document.getElementById('standby').classList.remove('active');
      document.getElementById('countdown').classList.remove('active');
      document.getElementById(name).classList.add('active');
    }

    function showStandby() {
      if (countdownHandle) {
        clearInterval(countdownHandle);
        countdownHandle = null;
      }
      const timerEl = document.getElementById('timer');
      if (timerEl) timerEl.textContent = COUNTDOWN_SECONDS;
      setScreen('standby');
    }

    function startCountdown() {
      if (countdownHandle) {
        clearInterval(countdownHandle);
      }

      let seconds = COUNTDOWN_SECONDS;
      const timerEl = document.getElementById('timer');
      timerEl.textContent = seconds;
      setScreen('countdown');

      countdownHandle = setInterval(function () {
        seconds -= 1;
        if (seconds < 0) {
          seconds = 0;
        }
        timerEl.textContent = seconds;

        if (seconds <= 0) {
          clearInterval(countdownHandle);
          countdownHandle = null;
          window.location.hash = 'countdown-completed';
        }
      }, 1000);
    }

    function cancelCountdown() {
      if (countdownHandle) {
        clearInterval(countdownHandle);
        countdownHandle = null;
      }
      window.location.hash = 'state=Standby';
      showStandby();
    }

    function renderPage() {
      const hash = window.location.hash;

      if (hash === '#state=Countdown') {
        startCountdown();
      } else if (hash === '#countdown-completed') {
        setScreen('countdown');
        const timerEl = document.getElementById('timer');
        if (timerEl) timerEl.textContent = '0';
      } else {
        showStandby();
      }
    }

    document.getElementById('cancelBtn')?.addEventListener('click', cancelCountdown);
    window.addEventListener('hashchange', renderPage);
    renderPage();
  </script>
</body>
</html>
