<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Support Kiosk</title>
  <style>
    :root {
      --bg-1: #020814;
      --bg-2: #081327;
      --panel: rgba(10, 20, 45, 0.88);
      --panel-border: rgba(118, 185, 0, 0.18);
      --text: #f4f7fb;
      --muted: rgba(244, 247, 251, 0.74);
      --nvidia: #76b900;
      --nvidia-bright: #9be22d;
      --nvidia-soft: rgba(118, 185, 0, 0.16);
      --nvidia-glow: rgba(118, 185, 0, 0.40);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 50% 20%, rgba(118, 185, 0, 0.10), transparent 24%),
        radial-gradient(circle at 50% 50%, rgba(28, 60, 140, 0.20), transparent 42%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
      position: relative;
    }

    .ambient-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 38%, rgba(118, 185, 0, 0.08), transparent 18%),
        radial-gradient(circle at 50% 50%, rgba(118, 185, 0, 0.06), transparent 34%);
      filter: blur(22px);
    }

    .panel {
      width: min(82vw, 760px);
      min-height: min(58vh, 520px);
      padding: 68px 44px 54px;
      border-radius: 28px;
      text-align: center;
      background: linear-gradient(180deg, rgba(10, 20, 45, 0.92), rgba(7, 14, 32, 0.90));
      border: 1px solid var(--panel-border);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 24px 60px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
    }

    .beacon-wrap {
      width: 74px;
      height: 74px;
      margin: 0 auto 22px;
      position: relative;
      display: grid;
      place-items: center;
    }

    .beacon-wrap::before,
    .beacon-wrap::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(118, 185, 0, 0.28);
      box-shadow: 0 0 24px rgba(118, 185, 0, 0.18);
      animation: beaconPulse 2.4s ease-out infinite;
    }

    .beacon-wrap::after {
      animation-delay: 1.2s;
    }

    .beacon {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--nvidia-bright) 0%, var(--nvidia) 100%);
      box-shadow:
        0 0 0 6px rgba(118, 185, 0, 0.10),
        0 0 20px rgba(118, 185, 0, 0.38);
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      margin-bottom: 22px;
      border-radius: 999px;
      border: 1px solid rgba(118, 185, 0, 0.18);
      background: rgba(118, 185, 0, 0.14);
      color: #b6f25d;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(46px, 6vw, 74px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 620px;
      font-size: clamp(21px, 2.4vw, 34px);
      line-height: 1.35;
      color: var(--muted);
    }

    .status {
      margin-top: 28px;
      font-size: 20px;
      line-height: 1.4;
      color: rgba(182, 242, 93, 0.92);
      min-height: 28px;
    }

    .countdown {
      margin-top: 24px;
      font-size: clamp(44px, 6vw, 72px);
      font-weight: 700;
      color: var(--text);
      display: none;
      text-shadow: 0 0 20px rgba(118, 185, 0, 0.14);
    }

    body.countdown .countdown {
      display: block;
    }

    @keyframes beaconPulse {
      0% {
        width: 18px;
        height: 18px;
        opacity: 0.75;
      }
      100% {
        width: 74px;
        height: 74px;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="ambient-glow"></div>

  <main class="panel">
    <div class="beacon-wrap">
      <div class="beacon"></div>
    </div>

    <div class="eyebrow">Virtual Support</div>

    <h1 id="title">Welcome</h1>

    <p class="subtitle" id="subtitle">
      Step up to the device to begin a virtual support call.
    </p>

    <div class="countdown" id="countdownValue">5</div>

    <div class="status" id="statusText">Waiting for kiosk state change...</div>
  </main>

  <script>
    let countdownTimer = null;
    let countdownValue = 5;

    function getHash() {
      return window.location.hash || '';
    }

    function getStateFromHash() {
      const hash = getHash();
      const match = hash.match(/state=([^&]+)/);
      return match ? match[1] : 'Standby';
    }

    function stopCountdown() {
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
    }

    function startCountdown() {
      stopCountdown();
      countdownValue = 5;
      const countdownEl = document.getElementById('countdownValue');
      countdownEl.textContent = countdownValue;

      countdownTimer = setInterval(() => {
        countdownValue -= 1;
        countdownEl.textContent = countdownValue;

        if (countdownValue <= 0) {
          stopCountdown();
          window.location.hash = 'countdown-completed';
        }
      }, 1000);
    }

    function renderState() {
      const hash = getHash();
      const state = getStateFromHash();

      const title = document.getElementById('title');
      const subtitle = document.getElementById('subtitle');
      const statusText = document.getElementById('statusText');

      document.body.classList.remove('countdown');

      if (hash.includes('countdown-completed')) {
        stopCountdown();
        title.textContent = 'Connecting';
        subtitle.textContent = 'Please wait while we connect you to virtual support.';
        statusText.textContent = 'Connecting to support...';
        return;
      }

      if (state === 'Countdown') {
        document.body.classList.add('countdown');
        title.textContent = 'Welcome';
        subtitle.textContent = 'Step up to the device to begin a virtual support call.';
        statusText.textContent = 'Preparing support session...';
        startCountdown();
        return;
      }

      stopCountdown();
      title.textContent = 'Welcome';
      subtitle.textContent = 'Step up to the device to begin a virtual support call.';
      statusText.textContent = 'Waiting for kiosk state change...';
      document.getElementById('countdownValue').textContent = '5';
    }

    window.addEventListener('hashchange', renderState);
    renderState();
  </script>
</body>
</html>
