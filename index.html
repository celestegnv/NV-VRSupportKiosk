<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Support</title>
  <style>
    :root {
      --bg-1: #030814;
      --bg-2: #09142a;
      --panel: rgba(10, 20, 45, 0.88);
      --panel-border: rgba(118, 255, 3, 0.18);
      --text: #f4f7fb;
      --muted: rgba(244, 247, 251, 0.72);
      --nvidia: #76b900;
      --nvidia-soft: rgba(118, 185, 0, 0.18);
      --glow: rgba(118, 185, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 20%, rgba(118, 185, 0, 0.10), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(20, 60, 140, 0.18), transparent 40%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
    }

    .shell {
      width: min(86vw, 980px);
      min-height: 68vh;
      display: grid;
      place-items: center;
      padding: 48px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(9, 19, 44, 0.92), rgba(7, 14, 32, 0.88));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 0 1px rgba(118, 185, 0, 0.05),
        0 24px 80px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 24%, rgba(118, 185, 0, 0.10), transparent 20%),
        radial-gradient(circle at 50% 0%, rgba(118, 185, 0, 0.08), transparent 36%);
      pointer-events: none;
    }

    .panel {
      width: min(100%, 760px);
      padding: 72px 48px 56px;
      border-radius: 28px;
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.03),
        0 20px 60px rgba(0, 0, 0, 0.30);
      position: relative;
      backdrop-filter: blur(10px);
    }

    .beacon-wrap {
      position: relative;
      width: 74px;
      height: 74px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
    }

    .beacon-wrap::before,
    .beacon-wrap::after {
      content: '';
      position: absolute;
      inset: 50%;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(118, 185, 0, 0.28);
      box-shadow: 0 0 24px rgba(118, 185, 0, 0.16);
      animation: beam 2.2s ease-out infinite;
    }

    .beacon-wrap::after {
      animation-delay: 1.1s;
    }

    .beacon {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: linear-gradient(180deg, #9be22d 0%, var(--nvidia) 100%);
      box-shadow:
        0 0 0 6px rgba(118, 185, 0, 0.10),
        0 0 22px rgba(118, 185, 0, 0.45);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border-radius: 999px;
      margin-bottom: 22px;
      letter-spacing: 0.14em;
      font-size: 14px;
      color: #b6f25d;
      background: rgba(118, 185, 0, 0.14);
      border: 1px solid rgba(118, 185, 0, 0.18);
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(48px, 6vw, 74px);
      line-height: 1.02;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .subtitle {
      max-width: 620px;
      margin: 0 auto;
      font-size: clamp(22px, 2.3vw, 34px);
      line-height: 1.35;
      color: var(--muted);
    }

    .status {
      margin-top: 28px;
      font-size: 20px;
      color: rgba(182, 242, 93, 0.92);
    }

    @keyframes beam {
      0% {
        width: 18px;
        height: 18px;
        opacity: 0.75;
      }
      100% {
        width: 74px;
        height: 74px;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="beacon-wrap">
        <div class="beacon"></div>
      </div>

      <div class="eyebrow">Virtual Support</div>

      <h1 id="title">Welcome</h1>

      <p class="subtitle" id="subtitle">
        Step up to the device to begin a virtual support call.
      </p>

      <div class="status" id="statusText">Waiting for kiosk state change...</div>
    </section>
  </main>

  <script>
    function getStateFromHash() {
      const hash = window.location.hash || '';
      const match = hash.match(/state=([^&]+)/);
      return match ? match[1] : 'Standby';
    }

    function renderState() {
      const state = getStateFromHash();
      const title = document.getElementById('title');
      const subtitle = document.getElementById('subtitle');
      const statusText = document.getElementById('statusText');

      if (state === 'Countdown') {
        title.textContent = 'Welcome';
        subtitle.textContent = 'Step up to the device to begin a virtual support call.';
        statusText.textContent = 'Preparing support session...';
      } else {
        title.textContent = 'Welcome';
        subtitle.textContent = 'Step up to the device to begin a virtual support call.';
        statusText.textContent = 'Waiting for kiosk state change...';
      }

      if (window.location.hash.includes('countdown-completed')) {
        statusText.textContent = 'Connecting to support...';
      }
    }

    window.addEventListener('hashchange', renderState);
    renderState();
  </script>
</body>
</html>
